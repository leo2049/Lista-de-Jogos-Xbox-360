<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Jogos Xbox 360</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* INTRO */
#intro {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#intro video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TÍTULO PRINCIPAL */
h1 {
    background: radial-gradient(circle at right, #107c10 0%, #0f2027 80%);
    padding: 20px;
    margin: 0;
    font-size: 1.8rem;
}

/* FAIXA DAS CATEGORIAS */
.categoria h2 {
    background: radial-gradient(circle at right, #107c10 0%, #0f2027 80%);
    padding: 12px;
    margin: 30px 0 15px 0;
    font-size: 1.3rem;
}

/* CONTAINER */
.container {
    padding: 10px;
}

input {
    padding: 12px;
    margin: 5px;
    width: 95%;
    max-width: 400px;
    border-radius: 6px;
    border: none;
    font-size: 1rem;
}

#contador {
    margin: 15px;
    font-weight: bold;
    color: #00ff88;
    font-size: 1rem;
}

/* LISTA DE JOGOS */
.games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* BOX DOS JOGOS */
.game {
    background-color: #1e1e1e;
    margin: 8px;
    padding: 15px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.3s;
    font-size: 1rem;
}

.game:hover {
    border: 2px solid #00ff88;
}

/* SELECIONADO - VERMELHO ELEGANTE */
.game.selected {
    background: linear-gradient(135deg, #7a0000, #b30000);
    border: 2px solid #ff4d4d;
    color: #ffffff;
}

button {
    background-color: transparent;
    color: #00ff88;
    padding: 14px 30px;
    border: 2px solid #00ff88;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    margin-top: 15px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <video id="videoIntro" autoplay muted playsinline preload="auto">
        <source src="https://leo2049.github.io/Lista-de-Jogos-Xbox-360/startup.mp4" type="video/mp4">
    </video>
</div>

<!-- CONTEÚDO -->
<div id="conteudo" style="display:none;">

<h1>🎮 Lista de Jogos Xbox 360</h1>

<div class="container">

<input type="text" id="cliente" placeholder="Nome do Cliente">
<input type="text" id="whatsapp" placeholder="WhatsApp">

<div id="contador">Jogos selecionados: 0</div>

<div id="games"></div>

<button onclick="copiarTexto()">📋 Copiar para WhatsApp</button>

</div>
</div>

<script>

/* INTRO FUNCIONANDO */
const video = document.getElementById("videoIntro");

video.onended = function() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
};

/* CATEGORIAS */

const categorias = {

"Ação / Aventura": [
"Ac Brotherhood","Ac Revelations","Assassin's Creed",
"Assassin's Creed Ii","Assassin's Creed 4 Black Flag",
"Assassin's Creed Rogue","Alice Madness Returns",
"Alone In The Dark","Batman Arkcity Goty",
"Call Of Juarez Bound In Blood","Dante's Inferno",
"Dmc Devil May Cry","Far Cry 2","Far Cry 3",
"Grand Theft Auto Iv","Gta Iv",
"L.a. Noire Complete Edition","Max Payne 3",
"Prototype","Red Dead Redemption Disc1",
"Red Dead Redemption Disc2","Spider Man Web Of Shadows",
"Spider-Man Dimensions","Spider-Man Eot",
"The Amazing Spider-Man 2","The Witcher 2",
"Thief","Tomb Raider","Watch Dogs (Gorazinobr)",
"X-Men Origins Wolverine"
],

"Tiro / FPS": [
"Battlefield - Bad Company 2","Battlefield 4",
"Call Of Duty Black Ops 2","Call Of Duty Black Ops 3",
"Call Of Duty Modern Warfare 3","Cod Advanced Warfare",
"Dead Space","Destiny The Taken King Legendary Edition",
"Left 4 Dead","Left 4 Dead 2","Medal Of Honor",
"Metro Last","Sniper Elite Iii",
"Titanfall","Unreal Tournament 3",
"Gears Of War 2","Gears Of War 3",
"Army Of Two - The Devil's Cartel",
"Earth Defense Force Insect Armageddon",
"Lost Planet 3","Fuse","Payday 2"
],

"Corrida": [
"Burnout 3","Dirt 3","F1 2013",
"Formula 1 2014","Forza Horizon",
"Forza Horizon 2","Forza Motorsport 3",
"Forza Motorsport 4 Racing","Hot Wheels Beat That",
"Hot Wheels World's Best Driver",
"Midnight Club Los Angeles",
"Motogp.14","Mx Vs Atv Supercross",
"Mx Vs Atv Untamed","Nascar 15",
"Need For Speed The Run",
"Nfs - Most Wanted","Nfs Hot Pursuit",
"Sonic All Stars Racing Transformed"
],

"Esportes": [
"Copa Do Mundo Fifa 14","Fifa 19",
"Fifa Street","Fifa Street 3",
"Michael Phelps Ptl","Nba 2k18",
"Pes 2014","Pes 2018","Pes16",
"Pro Evolution Soccer 2006",
"Pro Evolution Soccer 2012",
"Pro Evolution Soccer 2013",
"Skate 3","Ufcu3-Xex",
"Wwe All Star"
],

"Luta": [
"Bayonetta","Dbz Budokai Hd",
"Dragon Ball Z Battle Of Z",
"Dragon Ball Z Ultimate Tenkaichi",
"Injustice Gods Among Us Ultimate Edition",
"Marvel Vs Capcom 3",
"Mortal Kombat Komplete Edition",
"Mortal Kombat Vs Dc Universe",
"Naruto Storm R","Naruto Ultimate Storm",
"Persona 4 Arena Ultimax",
"Soul Calibur V","Street Fighter Iv",
"Street Fighter X Vs Tekken",
"Ultimate Marvel Vs. Capcom 3"
],

"RPG / Terror": [
"Dark Souls","Dark Souls Ii",
"Dead Island","Resident Evil 4 Hd",
"Resident Evil 5","Resident Evil 6",
"Resident Evil Remake Hd",
"Resident Evil Revelations 2",
"Shadows Of The Damned",
"The Elder Scrolls V Skyrim",
"Fallout 3","Diablo Iii Reaper Of Souls",
"Overlord 1","Half-Life 2",
"The Walking Dead"
],

"Infantil / Família": [
"Angry Birds Trilogy",
"Banjo-Kazooie Nuts & Bolts",
"Barbie & Her Sisters Puppy Rescue",
"Capcom Digital Collection",
"Castle Of Illusion",
"Crash Of The Titans",
"Ducktales Remastered",
"Epic Mickey 2 The Power Of Two",
"Family Guy Back To The Multiverse",
"Jogos Infantil","Joy Ride Turbo",
"Kinect","Lego Batman",
"Lego Batman 2 Dc Super Heroes",
"Lego Batman 3 Beyond Gotham",
"Lego Indiana Jones",
"Lego Marvel Avengers",
"Lego Marvel Super Heroes",
"Lego Star Wars Ii - The Original Trilogy",
"Lego Star Wars Tcs",
"Minecraft",
"Minecraft Story Mode - Season 2 Complete",
"Monopoly Plus",
"Pac Man And The Ghostly Adventures 2",
"Rayman Origins","Rayman® Legends",
"Sonic Free Riders","Sonic Generations",
"Sonic Unleashed",
"The Legend Of Spyro Dawn Of The Dragon",
"The Sims 3","Rock Band (Usa)",
"Rock Band 2 (Usa)",
"Rock Band 3 (Usa Europe)",
"Rock Band The Beatles",
"Gh 3","Novo Brazukas 2024",
"Yaiba Ninja Gaiden Z"
]
};

const container = document.getElementById("games");

for (let categoria in categorias) {

    const bloco = document.createElement("div");
    bloco.className = "categoria";

    const titulo = document.createElement("h2");
    titulo.innerText = categoria;
    bloco.appendChild(titulo);

    const linha = document.createElement("div");
    linha.className = "games";

    categorias[categoria].sort().forEach(jogo => {

        const div = document.createElement("div");
        div.className = "game";
        div.innerText = jogo;

        div.onclick = function() {
            div.classList.toggle("selected");
            atualizarContador();
        };

        linha.appendChild(div);
    });

    bloco.appendChild(linha);
    container.appendChild(bloco);
}

function atualizarContador() {
    const selecionados = document.querySelectorAll(".selected").length;
    document.getElementById("contador").innerText =
        "Jogos selecionados: " + selecionados;
}

function copiarTexto() {
    const cliente = document.getElementById("cliente").value || "(não preenchido)";
    const whatsapp = document.getElementById("whatsapp").value || "(não preenchido)";
    const selecionados = document.querySelectorAll(".selected");

    let texto = "Cliente: " + cliente + "\n";
    texto += "WhatsApp: " + whatsapp + "\n\n";
    texto += "Jogos:\n";

    selecionados.forEach(jogo => {
        texto += "- " + jogo.innerText + "\n";
    });

    navigator.clipboard.writeText(texto);
    alert("Copiado!");
}

</script>

</body>
</html>
