<!DOCTYPE html>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* CONTADOR FLUTUANTE */
#contadorFlutuante {
    position: fixed;
    bottom: 12px;
    right: 12px;
    background: rgba(0, 0, 0, 0.75);
    color: #00ff00;
    padding: 6px 10px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    z-index: 9999;
}

/* INTRO */
#intro {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#intro video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TÍTULO */
h1 {
    background: radial-gradient(circle at right, #107c10 0%, #0f2027 80%);
    padding: 20px;
    margin: 0;
    font-size: 1.8rem;
}

/* CATEGORIAS */
.categoria h2 {
    background: radial-gradient(circle at right, #107c10 0%, #0f2027 80%);
    padding: 12px;
    margin: 30px 0 15px 0;
    font-size: 1.3rem;
}

/* CONTAINER */
.container {
    padding: 10px;
}

input {
    padding: 12px;
    margin: 5px;
    width: 95%;
    max-width: 400px;
    border-radius: 6px;
    border: none;
    font-size: 1rem;
}

#contadorTexto {
    margin: 15px;
    font-weight: bold;
    color: #00ff88;
}

/* LISTA */
.games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* BOX DOS JOGOS */
.game {
    background-color: #1e1e1e;
    margin: 8px;
    padding: 15px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.3s;
    font-size: 1rem;
}

.game:hover {
    border: 2px solid #00ff88;
}

/* SELECIONADO */
.game.selected {
    background: linear-gradient(135deg, #7a0000, #b30000);
    border: 2px solid #ff4d4d;
    color: #ffffff;
}

button {
    background-color: transparent;
    color: #00ff88;
    padding: 14px 30px;
    border: 2px solid #00ff88;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1rem;
    margin-top: 15px;
}
</style>
</head>

<body>

</div>

const container = document.getElementById("games");

for (let categoria in categorias) {

    const bloco = document.createElement("div");
    bloco.className = "categoria";

    const titulo = document.createElement("h2");
    titulo.innerText = categoria;
    bloco.appendChild(titulo);

    const linha = document.createElement("div");
    linha.className = "games";

    categorias[categoria].sort().forEach(jogo => {

        const div = document.createElement("div");
        div.className = "game";
        div.innerText = jogo;

        div.onclick = function() {
            div.classList.toggle("selected");
            atualizarContador();
        };

        linha.appendChild(div);
    });

    bloco.appendChild(linha);
    container.appendChild(bloco);
}

/* CONTADOR */
function atualizarContador() {
    const selecionados = document.querySelectorAll(".selected");
    document.getElementById("contadorNumero").textContent = selecionados.length;
    document.getElementById("contadorInterno").textContent = selecionados.length;
}

/* COPIAR */
function copiarTexto() {

    const cliente = document.getElementById("cliente").value || "(não preenchido)";
    const whatsapp = document.getElementById("whatsapp").value || "";
    const selecionados = document.querySelectorAll(".selected");

    if(selecionados.length === 0){
        alert("Selecione pelo menos um jogo.");
        return;
    }

    let texto = "Cliente: " + cliente + "\n";
    texto += "WhatsApp: " + whatsapp + "\n\n";
    texto += "Jogos escolhidos:\n";

    selecionados.forEach(jogo => {
        texto += "- " + jogo.innerText + "\n";
    });

    const mensagem = encodeURIComponent(texto);

    let link;

    if(whatsapp !== ""){
        link = "https://wa.me/55" + whatsapp.replace(/\D/g,'') + "?text=" + mensagem;
    }else{
        link = "https://wa.me/?text=" + mensagem;
    }

    window.open(link, "_blank");
}
